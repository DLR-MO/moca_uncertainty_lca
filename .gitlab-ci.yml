image: python:3.10.20

stages:
  - test
  - publish

# Change pip's cache directory to be inside the project directory since we can
# only cache local items.
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# https://pip.pypa.io/en/stable/topics/caching/
cache:
  paths:
    - .cache/pip

before_script:
    - pip install --upgrade pip
    - python --version ; pip --version  # For debugging
    - pip install -r test_and_build_requirements.txt

test:
  stage: test
  script:
    - pip install --editable .
    - python tests/ci-dummy-test.py

publish:
  stage: publish
  dependencies:
    - test
  rules:
    - if: $CI_COMMIT_TAG && '$CI_COMMIT_BRANCH == "main"'
      when: always
  script:
    - pip install --upgrade build twine
    - python -m build
    - python -m twine upload -r testpypi -u __token__ -p ${MO_TESTPYPI_TOKEN_FULL} dist/*
    # - python -m twine upload -r pypi -u __token__ -p ${MO_PYPI_TOKEN_FULL} dist/*
  artifacts:
    paths:
      - dist/*
